<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Audio: Mera Mann Karaoke</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .chord-box { font-size: 80px; color: #ffcc00; margin: 20px; font-weight: bold; }
        .lyrics { font-size: 24px; color: #888; height: 100px; }
        .active { color: white; font-weight: bold; font-size: 30px; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold; }
        .instructions { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="instructions">1. Click "Unlock Audio" first <br> 2. Then click "Start Performance"</div>
    
    <button id="unlockBtn" onclick="unlockAudio()">1. UNLOCK AUDIO</button>
    <button id="startBtn" onclick="startPerformance()" style="display:none; background: #4CAF50;">2. START PERFORMANCE</button>

    <div class="chord-box" id="displayChord">--</div>
    <div class="lyrics" id="displayLyric">Wait for start...</div>

<script>
    let audioCtx;

    // 1. THIS UNLOCKS THE SOUND CHIP
    function unlockAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        document.getElementById('unlockBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        console.log("Audio Unlocked");
    }

    const songData = [
        { time: 0, chord: 'G', text: "Intro - Get Ready..." },
        { time: 3000, chord: 'G', text: "Tujhse hi to mili hai rahat" },
        { time: 7000, chord: 'C', text: "Tu hi to meri hai chahat" },
        { time: 11000, chord: 'Em', text: "Tujhse hi to judi..." },
        { time: 13000, chord: 'D', text: "zindagi..." },
        { time: 17000, chord: 'G', text: "Mera mann kehne laga" },
        { time: 21000, chord: 'Bm', text: "Paas aake na tu door jaa" }
    ];

    const chordFreqs = {
        'G': [196, 246, 293],
        'C': [130, 164, 196],
        'Em': [164, 196, 246],
        'D': [146, 220, 293],
        'Bm': [246, 311, 369]
    };

    function playSound(chord) {
        const freqs = chordFreqs[chord];
        const now = audioCtx.currentTime;

        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            // 'square' is louder and more distinct than 'triangle'
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(f, now + (i * 0.05));

            gain.gain.setValueAtTime(0.1, now); // Volume level
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(now + (i * 0.05));
            osc.stop(now + 1.5);
        });
    }

    function startPerformance() {
        document.getElementById('startBtn').disabled = true;
        
        songData.forEach(item => {
            setTimeout(() => {
                document.getElementById('displayChord').innerText = item.chord;
                document.getElementById('displayLyric').innerText = item.text;
                playSound(item.chord);
            }, item.time);
        });
    }
</script>
</body>
</html>
