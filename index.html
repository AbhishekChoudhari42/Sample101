<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mera Mann - Studio Quality</title>
    <style>
        :root { --gold: #ffcc00; --bg: #000; }
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; 
            text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh;
            justify-content: center;
        }
        #screen { padding: 20px; transition: 0.5s; }
        .chord-box { font-size: 100px; font-weight: 900; color: var(--gold); margin: 0; letter-spacing: -5px; }
        .lyrics { font-size: 26px; margin-top: 30px; min-height: 80px; line-height: 1.4; padding: 0 10px; font-weight: 300; }
        .btn { 
            background: var(--gold); border: none; padding: 20px 50px; 
            font-size: 20px; font-weight: bold; border-radius: 50px; 
            box-shadow: 0 0 30px rgba(255,204,0,0.2); transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); background: #e6b800; }
        .loader { font-size: 14px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="screen">
        <div id="setup">
            <h1 style="margin-bottom:10px;">Mera Mann</h1>
            <p style="color:#888; margin-bottom:40px;">Studio Guitar Practice</p>
            <button class="btn" id="startBtn" onclick="initPerformance()">LOAD HIGH-QUALITY AUDIO</button>
            <div class="loader" id="status">Uses real .wav guitar samples</div>
        </div>

        <div id="karaoke" style="display:none;">
            <div class="chord-box" id="displayChord">--</div>
            <div class="lyrics" id="displayLyric">Get ready...</div>
            <p style="color:var(--gold); font-size: 12px; margin-top: 40px; opacity: 0.5;">STRUMMING: D-D-UU-DU</p>
        </div>
    </div>

<script>
    let audioCtx;
    const samples = {};
    
    // Using high-quality acoustic steel-string samples from a reliable CDN
    const audioUrls = {
        'G':  'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/FatBoy/acoustic_guitar_steel-mp3/G3.mp3',
        'C':  'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/FatBoy/acoustic_guitar_steel-mp3/C3.mp3',
        'Em': 'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/FatBoy/acoustic_guitar_steel-mp3/E2.mp3',
        'D':  'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/FatBoy/acoustic_guitar_steel-mp3/D3.mp3',
        'Bm': 'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/FatBoy/acoustic_guitar_steel-mp3/B2.mp3'
    };

    const songData = [
        { t: 0,    c: 'G',  l: "Tujhse hi toh mili hai raahat" },
        { t: 4000, c: 'C',  l: "Tu hi toh meri hai chaahat" },
        { t: 8000, c: 'Em', l: "Tujhse hi toh judi zindagi" },
        { t: 12000, c: 'D',  l: "Aankhon mein hai kaisi yeh nami" },
        { t: 16000, c: 'G',  l: "Mera mann kehne laga" },
        { t: 20000, c: 'Bm', l: "Paas aake na tu door jaa" },
        { t: 24000, c: 'C',  l: "Chhoone de hont tere" },
        { t: 28000, c: 'D',  l: "Zara saanson mein apni basa..." }
    ];

    async function initPerformance() {
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        btn.innerText = "LOADING...";
        btn.disabled = true;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        try {
            for (const chord in audioUrls) {
                const resp = await fetch(audioUrls[chord]);
                const arrayBuf = await resp.arrayBuffer();
                samples[chord] = await audioCtx.decodeAudioData(arrayBuf);
            }
            startKaraoke();
        } catch (err) {
            status.innerText = "Load failed. Check internet connection.";
            btn.disabled = false;
            btn.innerText = "RETRY LOAD";
        }
    }

    function playStrum(chord) {
        if (!samples[chord]) return;

        // Custom function to create a "thick" strumming sound
        const trigger = (time, vol, pitch = 1) => {
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.buffer = samples[chord];
            source.playbackRate.value = pitch;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + time);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + time + 1.5);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(audioCtx.currentTime + time);
        };

        // Real Strumming Pattern Timing (D-D-UU-DU)
        trigger(0, 0.6);          // Down
        trigger(0.4, 0.5);        // Down
        trigger(0.6, 0.3, 1.02);  // Up (slightly higher pitch/faster)
        trigger(0.8, 0.3, 1.02);  // Up
        trigger(1.0, 0.5);        // Down
        trigger(1.2, 0.3, 1.02);  // Up
    }

    function startKaraoke() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('karaoke').style.display = 'block';

        songData.forEach(item => {
            setTimeout(() => {
                document.getElementById('displayChord').innerText = item.c;
                document.getElementById('displayLyric').innerText = item.l;
                
                // Play rhythm for this line (2 patterns of 2 seconds each)
                playStrum(item.c);
                setTimeout(() => playStrum(item.c), 1600);
                setTimeout(() => playStrum(item.c), 3200);

            }, item.t);
        });
    }
</script>
</body>
</html>
