<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Guitar: Mera Mann</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; }
        body { 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; 
            text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh;
        }
        #setup { display: flex; flex-direction: column; justify-content: center; height: 100%; }
        #player { display: none; padding: 40px 20px; }
        .chord-name { font-size: 110px; font-weight: 900; color: var(--gold); margin: 0; }
        .lyrics { font-size: 28px; margin-top: 30px; font-weight: 300; min-height: 80px; }
        .btn { 
            background: var(--gold); border: none; padding: 20px 60px; 
            font-size: 22px; font-weight: bold; border-radius: 50px;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color: var(--gold)">Mera Mann</h1>
        <p>Acoustic Guitar Engine v2.0</p>
        <button class="btn" onclick="startApp()">START PERFORMANCE</button>
    </div>

    <div id="player">
        <div class="chord-name" id="chord">--</div>
        <div class="lyrics" id="lyric">Get ready...</div>
    </div>

<script>
    let audioCtx;

    // Frequencies for G, C, Em, D, Bm
    const chordNotes = {
        'G':  [98.00, 123.47, 146.83, 196.00, 246.94, 392.00],
        'C':  [130.81, 164.81, 196.00, 261.63, 329.63],
        'Em': [82.41, 123.47, 164.81, 196.00, 246.94, 329.63],
        'D':  [146.83, 220.00, 293.66, 369.99, 587.33],
        'Bm': [123.47, 185.00, 246.94, 311.13, 369.99]
    };

    const song = [
        { t: 0,    c: 'G',  l: "Instrumental Intro" },
        { t: 4000, c: 'G',  l: "Tujhse hi toh mili hai raahat" },
        { t: 8000, c: 'C',  l: "Tu hi toh meri hai chaahat" },
        { t: 12000, c: 'Em', l: "Tujhse hi toh judi..." },
        { t: 14000, c: 'D',  l: "zindagi..." },
        { t: 18000, c: 'G',  l: "Teri yaadein hai kuch adhoori" },
        { t: 22000, c: 'C',  l: "Saans aadhi hai kuch hai poori" },
        { t: 26000, c: 'Em', l: "Aankhon mein hai kaisi..." },
        { t: 28000, c: 'D',  l: "yeh nami..." },
        { t: 32000, c: 'G',  l: "Mera mann kehne laga" },
        { t: 36000, c: 'Bm', l: "Paas aake na tu door jaa" },
        { t: 40000, c: 'C',  l: "Chhoone de hont tere" },
        { t: 44000, c: 'D',  l: "Zara saanson mein apni basa..." }
    ];

    // THE REAL GUITAR ENGINE (Karplus-Strong)
    function pluck(frequency, startTime, velocity) {
        const duration = 2.0;
        const sampleRate = audioCtx.sampleRate;
        const bufferSize = sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const data = buffer.getChannelData(0);
        
        const period = Math.floor(sampleRate / frequency);
        
        // Fill initial period with noise (the pluck)
        for (let i = 0; i < period; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        
        // Loop the noise through a low-pass filter (the string vibration)
        const decay = 0.992; // Higher = longer ring
        for (let i = period; i < bufferSize; i++) {
            data[i] = (data[i - period] + data[i - period + 1]) * 0.5 * decay;
        }
        
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        
        source.buffer = buffer;
        gain.gain.setValueAtTime(velocity, startTime);
        gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(startTime);
    }

    function strumPattern(chordName) {
        const notes = chordNotes[chordName];
        const now = audioCtx.currentTime;

        const playD = (offset) => {
            notes.forEach((f, i) => pluck(f, now + offset + (i * 0.03), 0.5));
        };
        const playU = (offset) => {
            [...notes].reverse().forEach((f, i) => pluck(f, now + offset + (i * 0.02), 0.2));
        };

        // D - D - UU - DU Pattern
        playD(0);
        playD(0.5);
        playU(0.75);
        playU(1.0);
        playD(1.25);
        playU(1.5);
    }

    function startApp() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('setup').style.display = 'none';
        document.getElementById('player').style.display = 'block';

        song.forEach(item => {
            setTimeout(() => {
                document.getElementById('chord').innerText = item.c;
                document.getElementById('lyric').innerText = item.l;
                strumPattern(item.c);
                setTimeout(() => strumPattern(item.c), 2000); // Repeat pattern for the line
            }, item.t);
        });
    }
</script>
</body>
</html>
